name: Deploy KaribPrint to GitHub Pages

on:
  push:
    branches: [claude/caribbean-web-to-print-0722gb]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only API routes (incompatible with static export)
        run: rm -rf src/app/api

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          REALISAPRINT_SHOP_ID: '251'
          REALISAPRINT_API_KEY: ${{ secrets.REALISAPRINT_API_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
